{{- if .Values.network.service.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "application-base.fullname" . }}-test-connection"
  labels:
    {{- include "application-base.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - {{ printf "%s:%v" (include "application-base.fullname" .) ((index .Values.network.service.ports 0).port | default 80) | quote }}
{{- end }}

