{{- if .Values.accessControl.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "application-base.serviceAccountName" . }}
  labels:
    {{- include "application-base.labels" . | nindent 4 }}
    {{- with .Values.accessControl.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge (.Values.accessControl.serviceAccount.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.accessControl.serviceAccount.automountServiceAccountToken }}
{{- end }}

