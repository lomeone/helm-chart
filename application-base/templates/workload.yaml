{{- if .Values.workload.enabled }}
{{- if eq .Values.workload.type "stateless" }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "application-base.fullname" . }}
  labels:
    {{- include "application-base.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.workload.autoscaling.enabled }}
  replicas: {{ .Values.workload.replicas }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.workload.stateless.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "application-base.selectorLabels" . | nindent 6 }}
  strategy:
    {{- if eq .Values.workload.stateless.strategy.type "rollingUpdate" }}
    canary:
      maxSurge: {{ .Values.workload.stateless.strategy.rollingUpdate.maxSurge | quote }}
      maxUnavailable: {{ .Values.workload.stateless.strategy.rollingUpdate.maxUnavailable | quote }}
    {{- else if eq .Values.workload.stateless.strategy.type "canary" }}
    canary:
      {{- with .Values.workload.stateless.strategy.canary.stableService }}
      stableService: {{ . | quote }}
      {{- end }}
      {{- with .Values.workload.stateless.strategy.canary.canaryService }}
      canaryService: {{ . | quote }}
      {{- end }}
      {{- with .Values.workload.stateless.strategy.canary.trafficRouting }}
      trafficRouting:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.stateless.strategy.canary.steps }}
      steps:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.workload.stateless.strategy.canary.analysis.enabled }}
      analysis:
        {{- with .Values.workload.stateless.strategy.canary.analysis.templates }}
        templates:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workload.stateless.strategy.canary.analysis.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if ne .Values.workload.stateless.strategy.canary.analysis.startingStep nil }}
        startingStep: {{ .Values.workload.stateless.strategy.canary.analysis.startingStep }}
        {{- end }}
      {{- end }}
    {{- else if eq .Values.workload.stateless.strategy.type "blueGreen" }}
    blueGreen:
      activeService: {{ default (include "application-base.fullname" .) .Values.workload.stateless.strategy.blueGreen.activeService | quote }}
      {{- with .Values.workload.stateless.strategy.blueGreen.previewService }}
      previewService: {{ . | quote }}
      {{- end }}
      autoPromotionEnabled: {{ .Values.workload.stateless.strategy.blueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.workload.stateless.strategy.blueGreen.scaleDownDelaySeconds }}
      {{- if .Values.workload.stateless.strategy.blueGreen.prePromotionAnalysis.enabled }}
      prePromotionAnalysis:
        {{- with .Values.workload.stateless.strategy.blueGreen.prePromotionAnalysis.templates }}
        templates:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workload.stateless.strategy.blueGreen.prePromotionAnalysis.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if .Values.workload.stateless.strategy.blueGreen.postPromotionAnalysis.enabled }}
      postPromotionAnalysis:
        {{- with .Values.workload.stateless.strategy.blueGreen.postPromotionAnalysis.templates }}
        templates:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workload.stateless.strategy.blueGreen.postPromotionAnalysis.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
    {{- else }}
    {{- fail "workload.stateless.strategy.type must be one of rollingUpdate, canary, blueGreen" }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "application-base.selectorLabels" . | nindent 8 }}
        {{- with .Values.workload.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $annotations := merge (.Values.workload.podAnnotations | default dict) (.Values.commonAnnotations | default dict) }}
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "application-base.serviceAccountName" . }}
      {{- with .Values.workload.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- if .Values.workload.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.workload.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.workload.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "application-base.name" . }}
          image: {{ include "application-base.image" . | quote }}
          imagePullPolicy: {{ .Values.workload.image.pullPolicy }}
          {{- with .Values.workload.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $env := concat (.Values.workload.env | default list) (.Values.config.env | default list) }}
          {{- with $env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $envFrom := concat (.Values.workload.envFrom | default list) (.Values.config.envFrom | default list) }}
          {{- if and .Values.config.configMap.enabled (not .Values.config.configMap.mount.enabled) }}
          {{- $envFrom = append $envFrom (dict "configMapRef" (dict "name" (include "application-base.fullname" .))) }}
          {{- end }}
          {{- if and .Values.config.externalSecrets.enabled .Values.config.externalSecrets.envFrom.enabled }}
          {{- $secretName := default (include "application-base.fullname" .) .Values.config.externalSecrets.target.name }}
          {{- $envFrom = append $envFrom (dict "secretRef" (dict "name" $secretName)) }}
          {{- end }}
          {{- with $envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $volumeMounts := .Values.workload.volumeMounts | default list }}
          {{- if and .Values.config.configMap.enabled .Values.config.configMap.mount.enabled }}
          {{- $volumeMounts = append $volumeMounts (dict "name" .Values.config.configMap.mount.name "mountPath" .Values.config.configMap.mount.mountPath "readOnly" .Values.config.configMap.mount.readOnly) }}
          {{- end }}
          {{- with $volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.workload.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $volumes := .Values.workload.volumes | default list }}
      {{- if and .Values.config.configMap.enabled .Values.config.configMap.mount.enabled }}
      {{- $volumes = append $volumes (dict "name" .Values.config.configMap.mount.name "configMap" (dict "name" (include "application-base.fullname" .))) }}
      {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- else if eq .Values.workload.type "stateful" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "application-base.fullname" . }}
  labels:
    {{- include "application-base.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.workload.autoscaling.enabled }}
  replicas: {{ .Values.workload.replicas }}
  {{- end }}
  serviceName: {{ ternary (printf "%s-headless" (include "application-base.fullname" .)) (include "application-base.fullname" .) .Values.network.headlessService.enabled }}
  podManagementPolicy: {{ .Values.workload.stateful.podManagementPolicy }}
  selector:
    matchLabels:
      {{- include "application-base.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: {{ .Values.workload.stateful.updateStrategy.type }}
    {{- if and (eq .Values.workload.stateful.updateStrategy.type "RollingUpdate") .Values.workload.stateful.updateStrategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml .Values.workload.stateful.updateStrategy.rollingUpdate | nindent 6 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "application-base.selectorLabels" . | nindent 8 }}
        {{- with .Values.workload.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $annotations := merge (.Values.workload.podAnnotations | default dict) (.Values.commonAnnotations | default dict) }}
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "application-base.serviceAccountName" . }}
      {{- with .Values.workload.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- if .Values.workload.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.workload.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.workload.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "application-base.name" . }}
          image: {{ include "application-base.image" . | quote }}
          imagePullPolicy: {{ .Values.workload.image.pullPolicy }}
          {{- with .Values.workload.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $env := concat (.Values.workload.env | default list) (.Values.config.env | default list) }}
          {{- with $env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $envFrom := concat (.Values.workload.envFrom | default list) (.Values.config.envFrom | default list) }}
          {{- if and .Values.config.configMap.enabled (not .Values.config.configMap.mount.enabled) }}
          {{- $envFrom = append $envFrom (dict "configMapRef" (dict "name" (include "application-base.fullname" .))) }}
          {{- end }}
          {{- if and .Values.config.externalSecrets.enabled .Values.config.externalSecrets.envFrom.enabled }}
          {{- $secretName := default (include "application-base.fullname" .) .Values.config.externalSecrets.target.name }}
          {{- $envFrom = append $envFrom (dict "secretRef" (dict "name" $secretName)) }}
          {{- end }}
          {{- with $envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.workload.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $volumeMounts := .Values.workload.volumeMounts | default list }}
          {{- if and .Values.config.configMap.enabled .Values.config.configMap.mount.enabled }}
          {{- $volumeMounts = append $volumeMounts (dict "name" .Values.config.configMap.mount.name "mountPath" .Values.config.configMap.mount.mountPath "readOnly" .Values.config.configMap.mount.readOnly) }}
          {{- end }}
          {{- with $volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.workload.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $volumes := .Values.workload.volumes | default list }}
      {{- if and .Values.config.configMap.enabled .Values.config.configMap.mount.enabled }}
      {{- $volumes = append $volumes (dict "name" .Values.config.configMap.mount.name "configMap" (dict "name" (include "application-base.fullname" .))) }}
      {{- end }}
      {{- with $volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workload.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.workload.stateful.volumeClaimTemplates }}
  volumeClaimTemplates:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- else }}
{{- fail "workload.type must be one of stateless, stateful" }}
{{- end }}
{{- end }}
