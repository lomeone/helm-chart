{{- if .Values.config.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "application-base.fullname" . }}
  labels:
    {{- include "application-base.labels" . | nindent 4 }}
    {{- with .Values.config.configMap.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge (.Values.config.configMap.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with .Values.config.configMap.data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .Values.config.configMap.binaryData }}
binaryData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}

