workload:
  type: stateful
  image:
    repository: ghcr.io/example/stateful-application
    tag: "1.0.0"
  stateful:
    podManagementPolicy: Parallel
    updateStrategy:
      type: RollingUpdate
    volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
  volumeMounts:
    - name: data
      mountPath: /data

network:
  headlessService:
    enabled: true
