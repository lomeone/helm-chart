workload:
  image:
    repository: ghcr.io/example/application
    tag: "1.0.0"
  stateless:
    analysis:
      templates:
        - name: bluegreen-analysis-application-base-smoke-test
          args:
            - name: service-name
          metrics:
            - name: smoke-test
              count: 1
              failureLimit: 0
              provider:
                web:
                  url: "http://{{args.service-name}}/actuator/health/readiness"
                  timeoutSeconds: 10
                  jsonPath: "{$.status}"
              successCondition: result == "UP"
    strategy:
      type: blueGreen
      blueGreen:
        activeService: bluegreen-analysis-application-base
        previewService: bluegreen-analysis-application-base-preview
        autoPromotionEnabled: false
        prePromotionAnalysis:
          enabled: true
          templates:
            - templateName: bluegreen-analysis-application-base-smoke-test
          args:
            - name: service-name
              value: bluegreen-analysis-application-base-preview
        postPromotionAnalysis:
          enabled: true
          templates:
            - templateName: bluegreen-analysis-application-base-smoke-test
          args:
            - name: service-name
              value: bluegreen-analysis-application-base

network:
  service:
    ports:
      - name: http
        port: 80
        targetPort: http
        protocol: TCP
