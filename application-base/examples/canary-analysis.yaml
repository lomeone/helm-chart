workload:
  image:
    repository: ghcr.io/example/application
    tag: "1.0.0"
  stateless:
    strategy:
      type: canary
      canary:
        stableService: canary-analysis-application-base
        canaryService: canary-analysis-application-base-canary
        steps:
          - setWeight: 20
          - pause:
              duration: 5m
          - setWeight: 50
          - pause:
              duration: 10m
        analysis:
          enabled: true
          templates:
            - templateName: canary-analysis-application-base-success-rate
          args:
            - name: service-name
              value: canary-analysis-application-base
          startingStep: 1
        analysisTemplates:
          - name: canary-analysis-application-base-success-rate
            args:
              - name: service-name
            metrics:
              - name: success-rate
                interval: 1m
                count: 5
                failureLimit: 1
                successCondition: result[0] >= 0.99
                provider:
                  prometheus:
                    address: http://prometheus-operated.monitoring.svc:9090
                    query: |
                      sum(rate(http_server_requests_seconds_count{service="{{args.service-name}}",status!~"5.."}[5m]))
                      /
                      sum(rate(http_server_requests_seconds_count{service="{{args.service-name}}"}[5m]))

network:
  service:
    ports:
      - name: http
        port: 80
        targetPort: http
        protocol: TCP

